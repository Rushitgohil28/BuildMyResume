<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | BuildMyResume</title>
    <!-- Link to builder.css to maintain the same dark theme and layout -->
    <link rel="stylesheet" href="css/builder.css">
</head>
<body>

    <!-- Background Blobs -->
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>

    <!-- Full Navbar -->
    <nav class="navbar">
        <div class="logo-area">
            <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;">
                <img id="logo" src="assets/logo_dark.png" alt="Logo" style="width: 45px; height: 45px;">
                <div class="logo-text">
                    <h2>BuildMyResume</h2>
                    <p style="display: block;">Create. Customize. Download.</p>
                </div>
            </a>
        </div>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="index.html" style="color: #60a5fa; font-weight: 600;">Home</a>
            <a href="builder.html" id="linkBuilder">Builder</a>
            <a href="index.html#templates" id="linkTemplates">Templates</a>
            <a href="settings.html" id="linkSettings">Settings</a>
            <label class="theme-switch" id="themeSwitchContainer">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </nav>

    <main class="builder-container" style="display: block; max-width: 900px; margin: 0 auto; padding-top: 20px;">
        
        <!-- Profile Dashboard Card -->
        <div class="right-panel" style="margin-bottom: 30px; display: flex; align-items: center; gap: 25px; flex-wrap: wrap;">
            <!-- Profile Photo -->
            <img id="profilePhoto" src="assets/default-avatar.png" class="avatar" style="width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #3b82f6; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);">
            
            <!-- User Information -->
            <div>
                <h1 id="userNameDisplay" style="margin-bottom: 5px;">Welcome!</h1>
                <p id="userEmail" style="color: #94a3b8; margin-bottom: 5px; font-size: 15px;">📧 Email: Not provided</p>
<p id="userPhone" style="color: #94a3b8; margin-bottom: 10px; font-size: 15px;">📱 Phone: Not provided</p>
                <p style="color: #60a5fa; font-size: 13px;">Manage your resume data and view your download history below.</p>
            </div>
        </div>

        <!-- History List -->
        <div class="left-panel">
            <h3>Download History</h3>
            <ul id="historyList" style="list-style: none; margin-top: 20px; padding: 0;">
                <!-- History items will be injected here by JS -->
            </ul>
        </div>
        
    </main>

    <!-- Scripts -->
    <script>
        // 1. Load User Details (Name, Email, Phone)
        const data = JSON.parse(localStorage.getItem("resumeData")) || {};
        
        if (data.name) document.getElementById("userNameDisplay").innerText = "Welcome, " + data.name;
        if (data.email) document.getElementById("userEmail").innerText = "📧 Email: " + data.email;
        if (data.phone) document.getElementById("userPhone").innerText = "📱 Phone: " + data.phone;

        // 2. Load Profile Photo
        const savedPhoto = localStorage.getItem("profileImage");
        if (savedPhoto) {
            document.getElementById("profilePhoto").src = savedPhoto;
        }

        // 3. Load Download History
        const historyList = document.getElementById("historyList");
        const history = JSON.parse(localStorage.getItem("resumeHistory")) || [];

        if (history.length === 0) {
            historyList.innerHTML = "<li style='padding: 15px; color: #94a3b8; background: rgba(255,255,255,0.02); border-radius: 12px;'>No download history found. Go to the builder and download a PDF!</li>";
        } else {
            history.forEach(item => {
                const li = document.createElement("li");
                li.style.padding = "15px";
                li.style.marginBottom = "10px";
                li.style.background = "rgba(255, 255, 255, 0.03)";
                li.style.borderRadius = "12px";
                li.style.border = "1px solid rgba(255,255,255,0.05)";
                li.style.display = "flex";
                li.style.justifyContent = "space-between";
                li.style.alignItems = "center";
                
                li.innerHTML = `
                    <div>
                        <strong style="display:block; color: #60a5fa; font-size: 16px;">Template: ${item.template}</strong>
                        <small style="color: #94a3b8; font-size: 13px;">${item.date}</small>
                    </div>
                    <span style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500; color: #60a5fa;">PDF Downloaded</span>
                `;
                historyList.appendChild(li);
            });
        }
    </script>
    
    <!-- Link to your theme.js so the Theme Toggle and Hamburger Menu work properly -->
    <script src="js/theme.js"></script>

</body>
</html>
